<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla Ciebie</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,400;1,500&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #fff5f7 0%, #fce4ec 100%);
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        /* Delikatne pływające cząsteczki w tle */
        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            background: rgba(255, 182, 193, 0.4);
            border-radius: 50%;
            filter: blur(40px);
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.2); }
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 40px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 80%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeIn 3s ease-in-out;
        }

        h1 {
            color: #d81b60;
            font-size: 2.5rem;
            margin-bottom: 20px;
            line-height: 1.4;
            font-weight: 500;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #ad1457;
            margin-top: 30px;
            opacity: 0.9;
        }

        .heart {
            color: #e91e63;
            font-size: 1.5rem;
            display: block;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Responsywność */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .signature { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob" style="width: 300px; height: 300px; top: -50px; left: -50px;"></div>
        <div class="blob" style="width: 400px; height: 400px; bottom: -100px; right: -100px; animation-delay: -5s;"></div>
    </div>

    <div class="container">
        <span class="heart">❤</span>
        <h1>Ta strona pojawi się w odpowiednim momencie. Oczekuj cierpliwie,</h1>
        <div class="signature">Albert</div>
    </div>

</body>
</html>
